<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@1.3.9/dist/web/static/pretendard.css">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;color:#1F2430;background:#EEF0F4;}
  @keyframes scSpin{to{transform:rotate(360deg);}}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:#D7DBE2;border-radius:99px;border:3px solid transparent;background-clip:content-box;}
  ::-webkit-scrollbar-track{background:transparent;}
</style>
</helmet>

<div style="min-width:100%;width:max-content;box-sizing:border-box;padding:40px 40px 130px;background:#EEF0F4;">
  <div style="width:1280px;margin:0 auto;display:flex;flex-direction:column;gap:13px;">

    <div style="display:flex;align-items:center;gap:9px;color:#7A818D;font-size:12.5px;font-weight:600;letter-spacing:-.01em;">
      <span style="display:inline-flex;width:7px;height:7px;border-radius:50%;background:#5B8DEF;"></span>
      팜플렛 씬 테마 · 밝은 게임풍 일러스트 표지 · 데스크톱 1280px
    </div>

    <!-- ===== MAIN CARD ===== -->
    <div style="width:1280px;background:#fff;border-radius:22px;border:1px solid #E8EAEF;box-shadow:0 1px 3px rgba(16,24,40,.05),0 24px 60px -26px rgba(16,24,40,.28);overflow:hidden;display:flex;flex-direction:column;">

      <!-- header -->
      <div style="padding:24px 30px 22px;border-bottom:1px solid #ECEEF1;display:flex;align-items:center;gap:15px;">
        <div style="width:44px;height:44px;border-radius:13px;background:linear-gradient(140deg,#6E9CF2,#8FBCF7);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 14px -4px rgba(91,141,239,.55);flex:none;">
          <svg width="24" height="24" viewBox="0 0 40 40" fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="24" cy="9" r="5"/><circle cx="24" cy="9" r="1.9" fill="#fff" stroke="none"/><path d="M24 14V25a5.5 5.5 0 0 1-11 0"/></svg>
        </div>
        <div style="display:flex;flex-direction:column;gap:3px;">
          <span style="font-size:20px;font-weight:800;color:#1B2030;letter-spacing:-.03em;">씬 테마 프리셋</span>
          <span style="font-size:13.5px;font-weight:500;color:#8A909B;">표지에 밝고 아기자기한 일러스트 씬이 깔리는 6가지 새 테마 · 플랫 벡터 · PDF 출력용 정지 일러스트</span>
        </div>
        <div style="margin-left:auto;display:inline-flex;align-items:center;gap:7px;background:#F4F0FE;border:1px solid #E7DEFB;border-radius:99px;padding:7px 13px;">
          <span style="width:8px;height:8px;border-radius:50%;background:#8B6FE0;"></span>
          <span style="font-size:12.5px;font-weight:700;color:#6D4FD0;">신규 씬 6종</span>
        </div>
      </div>

      <!-- chips -->
      <div style="padding:20px 30px;border-bottom:1px solid #ECEEF1;background:#FBFBFC;">
        <div style="font-size:12px;font-weight:700;color:#9AA0AB;letter-spacing:.02em;margin-bottom:12px;">테마 선택</div>
        <div style="display:flex;flex-wrap:wrap;gap:10px;">{{ chipsEl }}</div>
      </div>

      <!-- selected examples -->
      <div style="padding:30px;background:#F4F5F7;">
        {{ examplesEl }}
      </div>

      <!-- all covers gallery -->
      <div style="padding:26px 30px 30px;border-top:1px solid #ECEEF1;">
        <div style="font-size:13px;font-weight:700;color:#1B2030;margin-bottom:16px;">6가지 씬 표지 한눈에 보기</div>
        <div style="display:flex;gap:16px;justify-content:space-between;">{{ galleryEl }}</div>
      </div>
    </div>

    <!-- ===== DS REFERENCE ===== -->
    <div style="display:flex;align-items:center;gap:9px;color:#7A818D;font-size:12.5px;font-weight:600;margin-top:24px;">
      <span style="display:inline-flex;width:7px;height:7px;border-radius:50%;background:#3FC4A0;"></span>
      디자인 시스템 — 씬 테마 팔레트 · 적용 규칙
    </div>
    <div style="width:1280px;background:#fff;border:1px solid #E8EAEF;border-radius:20px;box-shadow:0 1px 3px rgba(16,24,40,.05);padding:30px 34px;display:grid;grid-template-columns:1.4fr 1fr;gap:44px;">
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div style="font-size:13px;font-weight:700;color:#1B2030;">씬 테마 팔레트 (ink · accent · accent2 · wash)</div>
        {{ dsPalettes }}
      </div>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div style="font-size:13px;font-weight:700;color:#1B2030;">적용 규칙</div>
        {{ dsRules }}
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1360,&quot;height&quot;:1220},&quot;viewState&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;sky&quot;,&quot;meadow&quot;,&quot;forest&quot;,&quot;sea&quot;,&quot;train&quot;,&quot;plane&quot;],&quot;default&quot;:&quot;sky&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  constructor(props){
    super(props);
    this.ICN={
      utensils:'<path d="M3 2v7c0 1.1.9 2 2 2h0a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>',
      coffee:'<path d="M10 2v2"/><path d="M14 2v2"/><path d="M16 8a1 1 0 0 1 1 1v8a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V9a1 1 0 0 1 1-1h14a4 4 0 1 1 0 8h-1"/><path d="M6 2v2"/>',
      landmark:'<line x1="3" x2="21" y1="22" y2="22"/><line x1="6" x2="6" y1="18" y2="11"/><line x1="10" x2="10" y1="18" y2="11"/><line x1="14" x2="14" y1="18" y2="11"/><line x1="18" x2="18" y1="18" y2="11"/><polygon points="12 2 20 7 4 7"/>',
      camera:'<path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/>',
      bus:'<path d="M8 6v6"/><path d="M15 6v6"/><path d="M2 12h19.6"/><path d="M18 18h3s.5-1.7.8-2.8c.1-.4.2-.8.2-1.2 0-.4-.1-.8-.2-1.2l-1.4-5C20.1 6.8 19.1 6 18 6H4a2 2 0 0 0-2 2v10h3"/><circle cx="7" cy="18" r="2"/><path d="M9 18h5"/><circle cx="16" cy="18" r="2"/>',
      'map-pin':'<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>',
      calendar:'<rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/><path d="M8 2v4"/><path d="M16 2v4"/>',
      route:'<circle cx="6" cy="19" r="3"/><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"/><circle cx="18" cy="5" r="3"/>',
      check:'<path d="M20 6 9 17l-5-5"/>',
      luggage:'<path d="M6 20a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2"/><path d="M8 18V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v14"/><path d="M10 20h4"/><circle cx="16" cy="20" r="2"/><circle cx="8" cy="20" r="2"/>',
    };
    this.CAT={transport:{label:'교통',icon:'bus'},museum:{label:'명소',icon:'landmark'},cafe:{label:'카페',icon:'coffee'},food:{label:'식당',icon:'utensils'},photo:{label:'포토',icon:'camera'}};
    // ===== scene themes =====
    this.THEMES={
      sky:{key:'sky',name:'해 · 하늘',ink:'#1E5A8A',accent:'#3FAEF0',accent2:'#FFC24D',wash:'#E4F3FE',soft:'#F2FAFF',line:'#D3E9F9',chipBg:'#DBEEFC'},
      meadow:{key:'meadow',name:'잔디 들판',ink:'#2E6B3A',accent:'#5BC46A',accent2:'#FF9BB6',wash:'#EAF7E1',soft:'#F4FBEF',line:'#D8EDCB',chipBg:'#E1F3D6'},
      forest:{key:'forest',name:'숲',ink:'#23553F',accent:'#3FA679',accent2:'#E2A24C',wash:'#E6F4EC',soft:'#F2FAF5',line:'#D2E8DB',chipBg:'#DBEFE3'},
      sea:{key:'sea',name:'바다',ink:'#0E566A',accent:'#25A9C6',accent2:'#FF7B6B',wash:'#E1F2F6',soft:'#F0FAFC',line:'#CEE8EE',chipBg:'#D6EDF3'},
      train:{key:'train',name:'기차',ink:'#7A3B2A',accent:'#F0704F',accent2:'#66C2E0',wash:'#FDECE5',soft:'#FEF5F1',line:'#F3D9CD',chipBg:'#F8DED3'},
      plane:{key:'plane',name:'비행기',ink:'#274690',accent:'#5B8DEF',accent2:'#FF9E6B',wash:'#EAF1FE',soft:'#F5F9FF',line:'#DCE6F8',chipBg:'#E4EDFB'},
    };
    this.ORDER=['sky','meadow','forest','sea','train','plane'];
    this.TRIP={title:'도쿄, 우리끼리 4일',dates:'2026. 7. 18 – 7. 21',nights:'3박 4일',place:'일본 · 도쿄',
      day:{label:'DAY 1',date:'7.18 금',items:[
        {t:'10:30',name:'나리타 국제공항 도착',cat:'transport',memo:'스카이라이너 예약'},
        {t:'13:00',name:'아사쿠사 센소지',cat:'museum',memo:'나카미세 거리 간식'},
        {t:'15:30',name:'스미다 리버 카페',cat:'cafe',memo:''},
        {t:'18:00',name:'우에노 이자카야',cat:'food',memo:'6인 예약 완료'},
      ]}};
    this.PREP=['여권 · 신분증','유심 / 로밍','엔화 환전','JR 패스 교환권','보조배터리','편한 운동화'];
    this.state={theme:this._valid(props.viewState)?props.viewState:'sky'};
  }
  _valid(v){return this && ['sky','meadow','forest','sea','train','plane'].indexOf(v)>=0;}
  componentDidUpdate(prev){ if(prev.viewState!==this.props.viewState && ['sky','meadow','forest','sea','train','plane'].indexOf(this.props.viewState)>=0) this.setState({theme:this.props.viewState}); }

  icon(name,size,color,sw){
    const inner=this.ICN[name]||'';
    const svg='<svg width="'+(size||20)+'" height="'+(size||20)+'" viewBox="0 0 24 24" fill="none" stroke="'+(color||'#1F2430')+'" stroke-width="'+(sw||2)+'" stroke-linecap="round" stroke-linejoin="round">'+inner+'</svg>';
    return React.createElement('span',{style:{display:'inline-flex',lineHeight:0},dangerouslySetInnerHTML:{__html:svg}});
  }
  jeroMark(size,color){
    const svg='<svg width="'+size+'" height="'+size+'" viewBox="0 0 40 40" fill="none" stroke="'+color+'" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="24" cy="9" r="5"/><circle cx="24" cy="9" r="1.9" fill="'+color+'" stroke="none"/><path d="M24 14V25a5.5 5.5 0 0 1-11 0"/></svg>';
    return React.createElement('span',{style:{display:'inline-flex',lineHeight:0},dangerouslySetInnerHTML:{__html:svg}});
  }
  svgSpan(inner,vw,vh,w,h,style){
    const svg='<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+vw+' '+vh+'" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">'+inner+'</svg>';
    return React.createElement('span',{style:Object.assign({display:'block',lineHeight:0},style||{}),dangerouslySetInnerHTML:{__html:svg}});
  }

  // ===== SCENE ILLUSTRATIONS (deterministic flat vector, viewBox 232x300) =====
  sceneInner(kind,th){
    const a=th.accent,a2=th.accent2;
    const cloud=(x,y,sc)=>'<g fill="#FFFFFF" opacity="0.96"><ellipse cx="'+x+'" cy="'+y+'" rx="'+(30*sc)+'" ry="'+(17*sc)+'"/><circle cx="'+(x-20*sc)+'" cy="'+(y+3*sc)+'" r="'+(13*sc)+'"/><circle cx="'+(x+22*sc)+'" cy="'+(y+2*sc)+'" r="'+(15*sc)+'"/><circle cx="'+(x-2*sc)+'" cy="'+(y-11*sc)+'" r="'+(15*sc)+'"/></g>';
    const sun=(x,y,r,col)=>{let g='';for(let i=0;i<8;i++){const an=i*Math.PI/4;g+='<line x1="'+(x+Math.cos(an)*(r+6))+'" y1="'+(y+Math.sin(an)*(r+6))+'" x2="'+(x+Math.cos(an)*(r+15))+'" y2="'+(y+Math.sin(an)*(r+15))+'" stroke="'+col+'" stroke-width="4" stroke-linecap="round"/>';}return g+'<circle cx="'+x+'" cy="'+y+'" r="'+r+'" fill="'+col+'"/>';};
    if(kind==='sky'){
      return '<defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#B9E4FF"/><stop offset="1" stop-color="#E9F6FF"/></linearGradient></defs>'
        +'<rect width="232" height="300" fill="url(#sg)"/>'+sun(176,74,30,a2)
        +cloud(60,150,1.15)+cloud(180,200,1.0)+cloud(110,235,0.85)
        +'<g stroke="'+a+'" stroke-width="3" stroke-linecap="round" opacity="0.5" fill="none"><path d="M40 90 q6 -7 12 0 q6 -7 12 0"/><path d="M150 120 q5 -6 10 0 q5 -6 10 0"/></g>';
    }
    if(kind==='meadow'){
      return '<defs><linearGradient id="mg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#DFF3FF"/><stop offset="1" stop-color="#EFFAE6"/></linearGradient></defs>'
        +'<rect width="232" height="300" fill="url(#mg)"/>'+sun(46,60,22,a2)
        +cloud(170,66,0.8)
        +'<path d="M0 180 Q116 140 232 180 L232 300 L0 300 Z" fill="#9BDB8E"/>'
        +'<path d="M0 220 Q116 185 232 220 L232 300 L0 300 Z" fill="'+a+'"/>'
        +'<path d="M0 262 Q116 238 232 262 L232 300 L0 300 Z" fill="#3E9E54"/>'
        // flowers
        +[[50,214],[95,232],[150,220],[195,238],[120,255]].map(p=>'<g><line x1="'+p[0]+'" y1="'+(p[1]+10)+'" x2="'+p[0]+'" y2="'+(p[1]+18)+'" stroke="#3E9E54" stroke-width="2.5"/><circle cx="'+p[0]+'" cy="'+p[1]+'" r="4.5" fill="'+a2+'"/><circle cx="'+(p[0]-5)+'" cy="'+(p[1]+3)+'" r="4" fill="#FFFFFF"/><circle cx="'+(p[0]+5)+'" cy="'+(p[1]+3)+'" r="4" fill="#FFFFFF"/><circle cx="'+p[0]+'" cy="'+p[1]+'" r="2.2" fill="#FFD84D"/></g>').join('');
    }
    if(kind==='forest'){
      const tree=(x,y,sc,col)=>'<g><rect x="'+(x-3*sc)+'" y="'+(y)+'" width="'+(6*sc)+'" height="'+(14*sc)+'" rx="2" fill="#B07A4A"/><path d="M'+(x-18*sc)+' '+y+' Q'+x+' '+(y-6*sc)+' '+(x+18*sc)+' '+y+' Z" fill="'+col+'"/><path d="M'+(x-16*sc)+' '+(y-14*sc)+' Q'+x+' '+(y-20*sc)+' '+(x+16*sc)+' '+(y-14*sc)+' L'+(x+14*sc)+' '+(y-6*sc)+' Q'+x+' '+(y-11*sc)+' '+(x-14*sc)+' '+(y-6*sc)+' Z" fill="'+col+'"/><path d="M'+(x-12*sc)+' '+(y-26*sc)+' Q'+x+' '+(y-34*sc)+' '+(x+12*sc)+' '+(y-26*sc)+' L'+(x+11*sc)+' '+(y-18*sc)+' Q'+x+' '+(y-23*sc)+' '+(x-11*sc)+' '+(y-18*sc)+' Z" fill="'+col+'"/></g>';
      return '<defs><linearGradient id="fg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#D8F0E4"/><stop offset="1" stop-color="#EEF8F1"/></linearGradient></defs>'
        +'<rect width="232" height="300" fill="url(#fg)"/>'+sun(190,54,20,a2)
        +'<path d="M0 210 Q116 180 232 210 L232 300 L0 300 Z" fill="#CDE9D6"/>'
        +'<path d="M96 300 L136 300 L124 214 Q116 210 108 214 Z" fill="#E8D6AE"/>'
        +'<line x1="116" y1="228" x2="116" y2="292" stroke="#F3E9CF" stroke-width="3" stroke-dasharray="7 8" stroke-linecap="round"/>'
        +tree(44,235,1.5,'#3E9E6E')+tree(196,240,1.6,'#2F8E60')+tree(74,205,1.05,'#4FB183')+tree(165,205,1.1,'#3E9E6E')+tree(120,192,0.85,'#57B98C');
    }
    if(kind==='sea'){
      return '<defs><linearGradient id="skg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#CFEFFA"/><stop offset="1" stop-color="#EAF8FC"/></linearGradient>'
        +'<linearGradient id="seg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="'+a+'"/><stop offset="1" stop-color="#1B8AA6"/></linearGradient></defs>'
        +'<rect width="232" height="300" fill="url(#skg)"/>'+sun(56,64,24,a2)
        +'<rect y="176" width="232" height="124" fill="url(#seg)"/>'
        +'<g stroke="#FFFFFF" stroke-width="2.5" opacity="0.55" fill="none" stroke-linecap="round"><path d="M20 208 q10 -7 20 0 q10 -7 20 0"/><path d="M150 200 q10 -7 20 0 q10 -7 20 0"/><path d="M70 236 q10 -7 20 0 q10 -7 20 0"/></g>'
        // lighthouse on rock (left)
        +'<ellipse cx="44" cy="184" rx="34" ry="12" fill="#7FB98A"/>'
        +'<path d="M34 176 L54 176 L50 120 L38 120 Z" fill="#FFFFFF"/><path d="M38 120 L50 120 L49 108 L39 108 Z" fill="'+a2+'"/>'
        +'<rect x="36" y="150" width="16" height="7" fill="'+a2+'"/><rect x="37" y="164" width="14" height="7" fill="'+a2+'"/>'
        +'<rect x="37" y="98" width="14" height="12" rx="2" fill="#FFE08A"/><path d="M40 98 L48 98 L46 90 L42 90 Z" fill="#5A6270"/>'
        // sailboat (right)
        +'<path d="M150 214 L206 214 L198 232 L158 232 Z" fill="#FFFFFF"/>'
        +'<line x1="178" y1="150" x2="178" y2="214" stroke="#8A6242" stroke-width="3"/>'
        +'<path d="M178 154 L178 208 L142 208 Z" fill="#FFFFFF"/><path d="M181 158 L181 206 L214 206 Z" fill="'+a2+'"/>';
    }
    if(kind==='train'){
      return '<defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#DCF0FB"/><stop offset="1" stop-color="#FDF1EC"/></linearGradient></defs>'
        +'<rect width="232" height="300" fill="url(#tg)"/>'+sun(188,56,20,a2)+cloud(60,74,0.8)
        +'<path d="M0 196 Q116 168 232 196 L232 300 L0 300 Z" fill="#BFE39E"/>'
        +'<path d="M0 236 Q116 214 232 236 L232 300 L0 300 Z" fill="#9AD27C"/>'
        // rail
        +'<g stroke="#8A93A0" stroke-width="4" stroke-linecap="round"><line x1="8" y1="286" x2="224" y2="286"/></g>'
        +'<g stroke="#B98A5A" stroke-width="4">'+[16,44,72,100,128,156,184,212].map(x=>'<line x1="'+x+'" y1="280" x2="'+x+'" y2="292"/>').join('')+'</g>'
        // train
        +'<g><rect x="36" y="232" width="60" height="40" rx="9" fill="'+a+'"/><rect x="80" y="216" width="34" height="56" rx="9" fill="'+a+'"/><rect x="88" y="226" width="18" height="16" rx="3" fill="#EAF6FF"/><rect x="46" y="242" width="16" height="14" rx="3" fill="#EAF6FF"/><rect x="66" y="242" width="12" height="14" rx="3" fill="#EAF6FF"/><rect x="98" y="208" width="12" height="12" rx="3" fill="#4A5568"/>'
        +'<circle cx="102" cy="200" r="7" fill="#FFFFFF" opacity="0.95"/><circle cx="114" cy="188" r="9" fill="#FFFFFF" opacity="0.9"/><circle cx="128" cy="178" r="6" fill="#FFFFFF" opacity="0.85"/>'
        +'<rect x="118" y="238" width="44" height="34" rx="8" fill="'+a2+'"/><rect x="126" y="246" width="12" height="14" rx="3" fill="#EAF6FF"/><rect x="142" y="246" width="12" height="14" rx="3" fill="#EAF6FF"/>'
        +'<circle cx="52" cy="278" r="8" fill="#4A5568"/><circle cx="88" cy="278" r="8" fill="#4A5568"/><circle cx="134" cy="278" r="7" fill="#4A5568"/><circle cx="52" cy="278" r="3" fill="#C4CAD2"/><circle cx="88" cy="278" r="3" fill="#C4CAD2"/></g>';
    }
    // plane
    return '<defs><linearGradient id="pg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#C7DBFF"/><stop offset="1" stop-color="#EDF3FF"/></linearGradient></defs>'
      +'<rect width="232" height="300" fill="url(#pg)"/>'
      +cloud(52,210,1.1)+cloud(190,235,0.95)+cloud(150,90,0.7)
