<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@1.3.9/dist/web/static/pretendard.css">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;color:#1F2430;background:#EEF0F4;}
  @keyframes scSpin{to{transform:rotate(360deg);}}
  @keyframes scFade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:#D7DBE2;border-radius:99px;border:3px solid transparent;background-clip:content-box;}
  ::-webkit-scrollbar-track{background:transparent;}
</style>
</helmet>

<div style="min-width:100%;width:max-content;box-sizing:border-box;padding:40px 40px 130px;background:#EEF0F4;">
  <div style="width:1280px;margin:0 auto;display:flex;flex-direction:column;gap:13px;">

    <div style="display:flex;align-items:center;gap:9px;color:#7A818D;font-size:12.5px;font-weight:600;letter-spacing:-.01em;">
      <span style="display:inline-flex;width:7px;height:7px;border-radius:50%;background:#5B8DEF;"></span>
      {{ crumb }}
    </div>

    {{ stageEl }}

    <!-- ===== DS REFERENCE ===== -->
    <div style="display:flex;align-items:center;gap:9px;color:#7A818D;font-size:12.5px;font-weight:600;margin-top:24px;">
      <span style="display:inline-flex;width:7px;height:7px;border-radius:50%;background:#3FC4A0;"></span>
      디자인 시스템 — 테마 프리셋 · A4 3단 패널 · 준비물 체크 · QR 자리
    </div>
    <div style="width:1280px;background:#fff;border:1px solid #E8EAEF;border-radius:20px;box-shadow:0 1px 3px rgba(16,24,40,.05);padding:30px 34px;display:grid;grid-template-columns:1.2fr 1fr;gap:44px;">
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div style="font-size:13px;font-weight:700;color:#1B2030;">테마 프리셋 팔레트</div>
        {{ dsThemes }}
        <div style="font-size:13px;font-weight:700;color:#1B2030;margin-top:8px;">포함 섹션 체크</div>
        {{ dsSections }}
      </div>
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div style="font-size:13px;font-weight:700;color:#1B2030;">준비물 체크 · QR 자리</div>
        {{ dsBits }}
      </div>
    </div>
  </div>
</div>

<!-- floating switcher -->
<div style="position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:9999;display:flex;align-items:center;gap:10px;background:rgba(27,32,48,.94);backdrop-filter:blur(10px);padding:6px 8px 6px 4px;border-radius:14px;box-shadow:0 10px 30px -6px rgba(0,0,0,.4);">
  <div style="display:flex;align-items:center;gap:3px;">
    <span style="color:#8B92A0;font-size:10.5px;font-weight:700;letter-spacing:.04em;padding:0 6px 0 9px;text-transform:uppercase;">화면</span>
    {{ switchEl }}
  </div>
  <div style="width:1px;height:22px;background:rgba(255,255,255,.14);"></div>
  {{ emptyToggle }}
</div>
</x-dc>

    const sun=(x,y,r,col)=>{let g='';for(let i=0;i<8;i++){const an=i*Math.PI/4;g+='<line x1="'+(x+Math.cos(an)*(r+6))+'" y1="'+(y+Math.sin(an)*(r+6))+'" x2="'+(x+Math.cos(an)*(r+15))+'" y2="'+(y+Math.sin(an)*(r+15))+'" stroke="'+col+'" stroke-width="4" stroke-linecap="round"/>';}return g+'<circle cx="'+x+'" cy="'+y+'" r="'+r+'" fill="'+col+'"/>';};
